<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#bgGradient)" filter="url(#shadow)"/>

  <!-- Inner glow -->
  <rect x="84" y="84" width="856" height="856" rx="180" ry="180" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>

  <!-- Letter A (left) -->
  <text x="280" y="580" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="280" font-weight="700" fill="white" opacity="0.95">A</text>

  <!-- Letter character (right) representing other languages -->
  <text x="580" y="580" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="280" font-weight="700" fill="white" opacity="0.95">文</text>

  <!-- Bidirectional arrows -->
  <g fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- Top arrow (left to right) -->
    <path d="M320 280 L704 280"/>
    <path d="M640 220 L704 280 L640 340"/>

    <!-- Bottom arrow (right to left) -->
    <path d="M704 744 L320 744"/>
    <path d="M384 684 L320 744 L384 804"/>
  </g>
</svg>
