name: Manual Release

# This workflow is for manual releases only.
# Automatic releases are handled by release-please.yml
#
# To create a manual release:
# 1. Go to Actions > Manual Release > Run workflow
# 2. Enter the version number (e.g., 1.2.3)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Build Release
        run: |
          VERSION=${{ inputs.version }} ./build_dmg.sh

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          files: |
            FluentApp-${{ inputs.version }}.dmg
            FluentApp-${{ inputs.version }}.dmg.sha256
          body: |
            ## FluentApp ${{ inputs.version }}

            ### Installation
            1. Download `FluentApp-${{ inputs.version }}.dmg`
            2. Open the DMG file
            3. Drag FluentApp to your Applications folder
            4. Open FluentApp from Applications
            5. Grant Accessibility permissions when prompted
            6. Add your API key for your preferred AI provider

            ### Requirements
            - macOS 13.0 (Ventura) or later
            - API key from OpenAI, Anthropic, Google, or xAI

            ### Supported AI Providers
            - OpenAI (GPT-4o-mini)
            - Anthropic (Claude 3 Haiku)
            - Google (Gemini 1.5 Flash)
            - xAI (Grok)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
