name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (for example 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: macos-14
    outputs:
      version: ${{ steps.version.outputs.value }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists for manual run
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping creation."
          else
            git tag -a "$TAG" -m "Release ${{ steps.version.outputs.value }}"
            git push origin "$TAG"
          fi

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            runner: macos-14
            build_arch: arm64
            artifact_suffix: -apple-silicon
          - label: Intel
            runner: macos-14
            build_arch: x86_64
            artifact_suffix: -intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$APPLE_DEVELOPER_ID_P12_BASE64" ]]; then
            echo "No signing certificate configured. Skipping import."
            exit 0
          fi

          echo "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build Release
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_ARCH: ${{ matrix.build_arch }}
          ARTIFACT_SUFFIX: ${{ matrix.artifact_suffix }}
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$APPLE_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            export NOTARIZE=1
          else
            export NOTARIZE=0
          fi
          ./build_dmg.sh

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.build_arch }}
          path: |
            Fluent-App-${{ needs.prepare.outputs.version }}${{ matrix.artifact_suffix }}.dmg
            Fluent-App-${{ needs.prepare.outputs.version }}${{ matrix.artifact_suffix }}.dmg.sha256

  release:
    name: Publish Release
    needs: [prepare, build]
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: |
            dist/release-arm64/Fluent-App-${{ needs.prepare.outputs.version }}-apple-silicon.dmg
            dist/release-arm64/Fluent-App-${{ needs.prepare.outputs.version }}-apple-silicon.dmg.sha256
            dist/release-x86_64/Fluent-App-${{ needs.prepare.outputs.version }}-intel.dmg
            dist/release-x86_64/Fluent-App-${{ needs.prepare.outputs.version }}-intel.dmg.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # Install Sparkle CLI tools
          SPARKLE_VERSION="2.6.4"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle && tar xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          SPARKLE_BIN="/tmp/sparkle/bin"

          # Collect DMGs into a single directory
          mkdir -p appcast_dmgs
          cp dist/release-arm64/*.dmg appcast_dmgs/ 2>/dev/null || true
          cp dist/release-x86_64/*.dmg appcast_dmgs/ 2>/dev/null || true

          # Generate appcast from DMGs
          APPCAST_ARGS=(appcast_dmgs --download-url-prefix "https://github.com/alfonsobries/fluent-app/releases/download/v${VERSION}/")
          if [[ -n "$SPARKLE_PRIVATE_KEY" ]]; then
            KEY_FILE="$(mktemp)"
            printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
            APPCAST_ARGS+=(--ed-key-file "$KEY_FILE")
          fi
          "$SPARKLE_BIN/generate_appcast" "${APPCAST_ARGS[@]}"
          rm -f "$KEY_FILE" 2>/dev/null || true

          cp appcast_dmgs/appcast.xml appcast.xml

          # Commit appcast back to repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git diff --cached --quiet || git commit -m "chore: update appcast for v${VERSION}"
          git push origin HEAD:main
