name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  swift:
    name: Swift Build, Test, Coverage
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Run Tests
        run: swift test

      - name: Verify Coverage
        run: ./scripts/test_coverage.sh

  build-website:
    name: Build Website
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: expo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: expo/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build
